# Supabase local-dev config. The remote `project_id` is filled in once the
# project is created in Phase 1. Treat this file as committed reference;
# real keys belong in `.env` (gitignored).

project_id = ""

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://portal.richmond-afri.com"
additional_redirect_urls = [
  "https://portal.richmond-afri.com",
  "http://localhost:3000",
  "eplp://",
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.mfa]
max_enrolled_factors = 5

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.sms]
enable_signup = false
enable_confirmations = true

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

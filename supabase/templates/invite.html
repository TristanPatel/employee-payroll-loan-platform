<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're invited to Richmond Finance</title>

  <body style="margin:0;padding:0;background:#f3f1ed;font-family:'Helvetica Neue',Arial,sans-serif;color:#1f2933;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f3f1ed;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.04);">
            <tr>
              <td style="background:#8b1e24;padding:18px 28px;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td><img src="https://richmond-eplp-portal.fly.dev/richmond-logo.png" alt="Richmond Finance" height="36" style="display:block;border:0;background:#ffffff;border-radius:6px;padding:4px 8px;" /></td>
                    <td align="right" style="color:#ffffff;font-size:11px;letter-spacing:2px;text-transform:uppercase;">Finance · Insurance · Advisory</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:36px 32px 8px;">
                <h1 style="margin:0;font-size:22px;font-weight:600;color:#1f2933;">You're invited to Richmond Finance</h1>
                <p style="margin:8px 0 0;font-size:14px;color:#5b6770;">Accept the invitation to set up your Richmond account.</p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:24px 32px 36px;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#8b1e24;color:#ffffff;text-decoration:none;font-weight:600;padding:14px 28px;border-radius:10px;font-size:15px;">Accept invitation</a>
              </td>
            </tr>
            <tr>
              <td style="background:#1f2933;color:#cbd2d9;padding:18px 32px;font-size:11px;line-height:1.6;">
                Richmond Finance Limited · Lusaka · <a href="https://www.richmond-afri.com" style="color:#cbd2d9;text-decoration:none;">www.richmond-afri.com</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

# fly.toml — Fly.io deployment for the @eplp/web Next.js app.
#
# This file is the single source of truth. Fly builds the root Dockerfile
# and runs the resulting container — there is no autodetect / buildpack
# layer to override it (unlike Vercel's framework preset or Railway's
# Railpack). What is written here is what runs.
#
# Region: jnb (Johannesburg) — closest Fly region to Zambia for latency.
#
# NOTE: Fly app names are globally unique across ALL Fly users, so this
# uses a Richmond-specific name to avoid collisions on first create.

app = "richmond-eplp-portal"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

  # flyctl passes these to the remote builder automatically (no --build-arg
  # needed in the workflow). NEXT_PUBLIC_PORTAL_URL is baked into the bundle,
  # so THIS line is the domain-cutover lever: flip it to
  # https://portal.richmond-afri.com once the custom domain serves TLS, and the
  # next deploy rebuilds every absolute link (metadata, sealed-PDF verify URLs,
  # password-reset redirects) onto the new host.
  [build.args]
    NEXT_PUBLIC_PORTAL_URL = "https://richmond-eplp-portal.fly.dev"

[http_service]
  internal_port = 3000          # matches the Dockerfile's default PORT
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "40s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

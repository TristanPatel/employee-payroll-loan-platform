<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm a sensitive action at Richmond Finance</title>
  </head>
  <body style="margin:0;padding:0;background:#f3f1ed;font-family:'Helvetica Neue',Arial,sans-serif;color:#1f2933;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f3f1ed;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:14px;overflow:hidden;">
            <tr>
              <td style="background:#8b1e24;padding:18px 28px;">
                <img src="https://richmond-eplp-portal.fly.dev/richmond-logo.png" alt="Richmond Finance" height="36" style="display:block;border:0;background:#ffffff;border-radius:6px;padding:4px 8px;" />
              </td>
            </tr>
            <tr>
              <td style="padding:36px 32px 8px;">
                <h1 style="margin:0;font-size:22px;font-weight:600;color:#1f2933;">Confirm it's you</h1>
                <p style="margin:8px 0 0;font-size:14px;color:#5b6770;">You're about to do something sensitive on your Richmond account. Enter the code below to confirm.</p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:24px 32px 28px;">
                <div style="display:inline-block;background:#faf9f7;border:1px solid #e6e1da;border-radius:12px;padding:22px 36px;">
                  <div style="font-family:'Courier New',monospace;font-size:40px;font-weight:700;letter-spacing:14px;color:#8b1e24;">{{ .Token }}</div>
                </div>
              </td>
            </tr>
            <tr>
              <td style="background:#1f2933;color:#cbd2d9;padding:18px 32px;font-size:11px;line-height:1.6;">
                Richmond Finance Limited · Lusaka · <a href="https://www.richmond-afri.com" style="color:#cbd2d9;text-decoration:none;">www.richmond-afri.com</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

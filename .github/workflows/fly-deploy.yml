name: Fly Deploy

# Auto-deploys the web app to Fly.io on every push to main. Fly builds
# the root Dockerfile remotely on its own builders, so this workflow only
# needs flyctl + the deploy token — no Node/pnpm install here.
#
# Requires one GitHub repo secret:
#   FLY_API_TOKEN — create with `fly tokens create deploy` (or in the Fly
#                   dashboard → Account → Access Tokens).
#
# Skips gracefully (does not fail the run) if FLY_API_TOKEN is unset, so
# the workflow can be merged before the token is configured.

on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gate on FLY_API_TOKEN
        id: gate
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::FLY_API_TOKEN not set; skipping Fly deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup flyctl
        if: steps.gate.outputs.skip == 'false'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        if: steps.gate.outputs.skip == 'false'
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

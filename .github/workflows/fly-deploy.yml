name: Fly Deploy

# Auto-deploys the web app to Fly.io on every push to main, or manually
# via the "Run workflow" button in the Actions tab. Fly builds the root
# Dockerfile remotely on its own builders, so this workflow only needs
# flyctl + the deploy token — no Node/pnpm install here.
#
# Requires one GitHub repo secret:
#   FLY_API_TOKEN — create in the Fly dashboard → Account → Tokens
#                   (or `fly tokens create deploy`).
#
# The first run creates the Fly app ("richmond-eplp-portal") if it does
# not exist, so you never have to run a CLI locally. Skips gracefully if
# the token is unset, so the workflow can merge before the secret is set.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: fly-deploy
  cancel-in-progress: false

env:
  FLY_APP: richmond-eplp-portal

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gate on FLY_API_TOKEN
        id: gate
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::FLY_API_TOKEN not set; skipping Fly deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup flyctl
        if: steps.gate.outputs.skip == 'false'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if missing
        if: steps.gate.outputs.skip == 'false'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if ! flyctl status --app "$FLY_APP" >/dev/null 2>&1; then
            echo "App $FLY_APP not found — creating it."
            flyctl apps create "$FLY_APP" --org personal
          else
            echo "App $FLY_APP already exists."
          fi

      - name: Deploy
        if: steps.gate.outputs.skip == 'false'
        run: flyctl deploy --remote-only --ha=false --app "$FLY_APP"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

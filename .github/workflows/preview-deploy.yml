name: Vercel preview deploy

# Deploys a Vercel preview of apps/web on every PR. Production deploys
# happen automatically when Vercel sees a push to main (no extra job
# needed here).
#
# Requires three GitHub repo secrets:
#   VERCEL_TOKEN         — personal token from vercel.com/account/tokens
#   VERCEL_ORG_ID        — visible at vercel.com/<org>/settings
#   VERCEL_PROJECT_ID    — visible at vercel.com/<org>/<project>/settings
#
# Skip with [skip vercel] in the PR title.

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: vercel-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build + deploy preview
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.title, '[skip vercel]') }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Skip if VERCEL_TOKEN missing
        id: gate
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN not set; skipping preview deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        if: steps.gate.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        if: steps.gate.outputs.skip == 'false'
        run: pnpm add -g vercel@latest

      - name: Pull Vercel project config
        if: steps.gate.outputs.skip == 'false'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Build
        if: steps.gate.outputs.skip == 'false'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Deploy preview
        if: steps.gate.outputs.skip == 'false'
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
        working-directory: apps/web

      - name: Comment preview URL on PR
        if: steps.gate.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.deploy.outputs.url }}`;
            const body = `🔍 Vercel preview: ${url}\n\n_Auto-deployed by CI. Production at portal.richmond-afri.com._`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

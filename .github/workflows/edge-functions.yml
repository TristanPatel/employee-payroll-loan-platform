name: Deploy Edge Functions

# Deploys every function under supabase/functions/ to the Supabase project on
# push to main when a function (or its config) changes. Per-function verify_jwt
# is read from supabase/config.toml, so notification-worker stays public and the
# others stay JWT-protected.
#
# Requires one GitHub repo secret:
#   SUPABASE_ACCESS_TOKEN — create at supabase.com/dashboard/account/tokens.
#
# Skips gracefully if the token is unset, so the workflow can merge before the
# secret is configured.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/edge-functions.yml'
  workflow_dispatch: {}

concurrency:
  group: edge-functions-deploy
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: slmrpvlhttgrhoinpfwa

jobs:
  deploy:
    name: Deploy functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gate on SUPABASE_ACCESS_TOKEN
        id: gate
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::SUPABASE_ACCESS_TOKEN not set; skipping edge-function deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.gate.outputs.skip == 'false'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all functions
        if: steps.gate.outputs.skip == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Deploy each function found in source. verify_jwt comes from
          # supabase/config.toml ([functions.<name>] blocks).
          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"
            # Skip the Supabase internal _shared dir if present.
            [ "$name" = "_shared" ] && continue
            echo "::group::Deploy $name"
            supabase functions deploy "$name" --project-ref "$SUPABASE_PROJECT_REF"
            echo "::endgroup::"
          done
